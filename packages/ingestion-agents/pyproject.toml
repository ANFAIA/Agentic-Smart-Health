[project]
name = "ingestion-agents"
version = "0.1.0"
description = "Agentes de ingesta del Digital Twin dental (1 modalidad = 1 soporte = 1 agente)"
requires-python = ">=3.11"
dependencies = [
    "core-schemas",
    "numpy>=2.0",
    "pydicom>=3.0",
]

[project.optional-dependencies]
# El `report-agent` solo necesita un LLM cuando se le pide el backend `llm`;
# su backend por defecto (`rules`) es determinista y no requiere red ni clave.
llm = ["anthropic>=0.40"]
# Lectura de PDF real; sin esto el `report-agent` solo ingiere informes .txt/.md.
pdf = ["pypdf>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingestion_agents"]

[tool.uv.sources]
core-schemas = { workspace = true }
